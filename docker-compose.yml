services:
  webapp:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://api.saomiguelbus.com}
        VITE_ISLAND_KEY: ${VITE_ISLAND_KEY:-sao-miguel}
        VITE_SITE_URL: ${VITE_SITE_URL:-https://app.saomiguelbus.com}
        VITE_BASE_DOMAIN: ${VITE_BASE_DOMAIN:-saomiguelbus.com}
        VITE_ANDROID_APP_URL: ${VITE_ANDROID_APP_URL:-}
        VITE_IOS_APP_URL: ${VITE_IOS_APP_URL:-https://apps.apple.com/app/id6777066837}
        VITE_IOS_APP_ID: ${VITE_IOS_APP_ID:-6777066837}
    restart: unless-stopped
    ports:
      - "${WEBAPP_HOST_PORT:-80}:${WEBAPP_CONTAINER_PORT:-80}"
    networks:
      - default
      - dokploy-network
    labels:
      - traefik.docker.network=dokploy-network

networks:
  dokploy-network:
    external: true
