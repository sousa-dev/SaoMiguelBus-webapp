# Maps a module subdomain (e.g. radares.saomiguelbus.com) to the prerendered
# module directory so crawlers/social scrapers get correct meta at the subdomain
# root. Optional: only relevant if you point module subdomains at this app.
map $host $smb_module_root {
    default "";
    ~*^autocarros\.    /transit;
    ~*^noticias\.      /news;
    ~*^meteorologia\.  /weather;
    ~*^sismos\.        /earthquakes;
    ~*^trilhos\.       /trails;
    ~*^experiencias\.  /tours;
    ~*^radares\.       /traffic;
    ~*^servicos\.      /marketplace;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache fingerprinted assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # On a module subdomain, serve that module's prerendered page at the root.
    location = / {
        try_files $smb_module_root/index.html /index.html;
        add_header Cache-Control "no-cache";
    }

    # SPA fallback — unknown paths resolve to a prerendered module page (e.g.
    # /traffic/index.html) when present, otherwise the app shell.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;
    gzip_min_length 1024;
}
